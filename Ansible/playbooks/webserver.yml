---
# Web server playbook - Nginx + PHP setup
- name: Configure Web Server
  hosts: webservers
  become: yes

  vars:
    server_hostname: webserver
    enable_ssl: false

  tasks:
    - name: Install Nginx
      apt:
        name:
          - nginx
          - nginx-extras
        state: present
        update_cache: yes

    - name: Ensure Nginx service is running
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Install PHP and extensions
      apt:
        name:
          - php
          - php-fpm
          - php-mysql
          - php-cli
          - php-curl
          - php-gd
          - php-mbstring
          - php-xml
          - php-xmlrpc
          - php-zip
          - php-json
        state: present

    - name: Configure PHP-FPM
      lineinfile:
        path: /etc/php/8.3/fpm/pool.d/www.conf
        regexp: '^;?listen\.owner'
        line: 'listen.owner = www-data'
      notify: Restart PHP-FPM

    - name: Configure PHP-FPM listen group
      lineinfile:
        path: /etc/php/8.3/fpm/pool.d/www.conf
        regexp: '^;?listen\.group'
        line: 'listen.group = www-data'
      notify: Restart PHP-FPM

    - name: Create web root directory
      file:
        path: /var/www/html
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Deploy default index.html
      template:
        src: templates/index.html.j2
        dest: /var/www/html/index.html
        owner: www-data
        group: www-data
        mode: '0644'

    - name: Configure Nginx default site
      template:
        src: templates/nginx-default.conf.j2
        dest: /etc/nginx/sites-available/default
        owner: root
        group: root
        mode: '0644'
      notify: Reload Nginx

  handlers:
    - name: Restart PHP-FPM
      service:
        name: php8.3-fpm
        state: restarted

    - name: Reload Nginx
      service:
        name: nginx
        state: reloaded

