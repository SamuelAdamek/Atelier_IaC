---
# Common playbook - Basic setup for all servers
- name: Common configuration for all servers
  hosts: all
  become: yes
  vars:
    http_port: 80
    https_port: 443

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
      changed_when: false

    - name: Upgrade all packages
      apt:
        upgrade: full

    - name: Install common packages
      apt:
        name:
          - curl
          - wget
          - git
          - vim
          - unzip
          - ca-certificates
          - gnupg
        state: present

    - name: Create admin group
      group:
        name: admin
        state: present

    - name: Add adminroot to admin group
      user:
        name: adminroot
        groups: admin
        append: yes

